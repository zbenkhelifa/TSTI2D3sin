<style>

  .guide-item.active { background: var(--blue-dim); border-left-color: var(--blue); }
  .guide-item .gi-icon { font-size: 1.4rem; flex-shrink: 0; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: var(--surface2); border-radius: 8px; }

  .sidebar-section-label { padding: .6rem 1rem .2rem; font-size: .7rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }

  .topbar { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 1rem; gap: .75rem; z-index: 100; }

  .topbar-badge { font-size: .72rem; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); padding: .15rem .5rem; border-radius: 10px; flex-shrink: 0; }

  .progress-bar { position: fixed; top: 48px; left: 0; height: 2px; background: var(--blue); transition: width .4s ease; z-index: 100; }

  .slides-wrapper { position: fixed; inset: 48px 0 64px 0; overflow: hidden; }
  .slides-track { display: flex; height: 100%; transition: transform .45s cubic-bezier(.4,0,.2,1); will-change: transform; }
  .slide { flex: 0 0 100vw; width: 100vw; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem 1.5rem 1rem; overflow-y: auto; }

  .slide-step { background: var(--bg); }
  .slide-final { background: radial-gradient(ellipse 80% 60% at 50% 100%, #1a3a2c 0%, #0d1117 60%); }

  .hero-octocat { font-size: 4rem; margin-bottom: .75rem; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .hero-title { font-size: clamp(1.6rem,5vw,2.4rem); font-weight: 800; text-align: center; line-height: 1.15; margin-bottom: .6rem; }
  .hero-title span { color: var(--blue); }
  .hero-title span.green { color: var(--green); }
  .hero-sub { color: var(--muted); font-size: .9rem; text-align: center; margin-bottom: 2rem; max-width: 300px; }
  .badge-row { display: flex; gap: .5rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2rem; }
  .badge { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: .25rem .75rem; font-size: .78rem; color: var(--muted); display: flex; align-items: center; gap: .35rem; }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; }
  .start-btn { background: var(--green); color: #fff; font-family: 'Inter',sans-serif; font-size: .95rem; font-weight: 700; border: none; border-radius: 8px; padding: .75rem 2rem; cursor: pointer; transition: background .2s; }
  .start-btn:hover { background: #4ac861; }

  .step-inner { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 1rem; }
  .step-chip { display: inline-flex; align-items: center; gap: .4rem; background: var(--blue-dim); border: 1px solid var(--blue); color: var(--blue); border-radius: 20px; padding: .2rem .75rem; font-size: .75rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; align-self: flex-start; }
  .step-title { font-size: clamp(1.3rem,4vw,1.8rem); font-weight: 800; line-height: 1.2; }
  .step-desc { color: var(--muted); font-size: .93rem; line-height: 1.7; }
  .step-desc b { color: var(--text); font-weight: 600; }
  .code-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .65rem .9rem; font-family: 'JetBrains Mono',monospace; font-size: .88rem; color: var(--blue); display: flex; align-items: center; gap: .5rem; }
  .code-block::before { content: '$'; color: var(--muted); font-size: .78rem; }
  .code-block.no-prefix::before { content: ''; }
  .info-box, .warn-box { border-radius: 8px; padding: .7rem .9rem; font-size: .86rem; line-height: 1.6; display: flex; gap: .5rem; align-items: flex-start; }
  .info-box { background: var(--green-dim); border: 1px solid var(--green); color: #7ee787; }
  .warn-box { background: #2d1a00; border: 1px solid var(--orange); color: var(--orange); }
  .box-icon { font-size: .95rem; flex-shrink: 0; margin-top: 1px; }
  .mockup { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .9rem; font-size: .83rem; color: var(--muted); }
  .mockup-bar { display: flex; gap: .35rem; margin-bottom: .65rem; }
  .mockup-dot { width: 9px; height: 9px; border-radius: 50%; }
  .m-red{background:#f85149} .m-yellow{background:#f0883e} .m-green{background:var(--green)}
  .mockup-url { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: .3rem .7rem; font-family: 'JetBrains Mono',monospace; font-size: .78rem; color: var(--blue); text-align: center; margin-bottom: .4rem; }
  .mockup-label { text-align: center; font-size: .76rem; color: var(--muted); }

  /* Choix visuels (public/privé) */
  .choice-row { display: flex; gap: .6rem; }
  .choice-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem; display: flex; flex-direction: column; gap: .3rem; }
  .choice-card.recommended { border-color: var(--green); }
  .choice-card .cc-icon { font-size: 1.4rem; }
  .choice-card .cc-title { font-size: .85rem; font-weight: 700; }
  .choice-card .cc-desc { font-size: .78rem; color: var(--muted); line-height: 1.5; }
  .choice-card .cc-badge { font-size: .68rem; font-weight: 700; color: var(--green); }

  .final-icon { font-size: 3.5rem; margin-bottom: .75rem; }
  .final-title { font-size: clamp(1.4rem,4vw,2rem); font-weight: 800; text-align: center; margin-bottom: .4rem; }
  .final-title span { color: var(--green); }
  .final-sub { color: var(--muted); text-align: center; margin-bottom: 1.2rem; font-size: .9rem; max-width: 320px; }
  .next-steps { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1.5rem; }
  .next-item { display: flex; align-items: center; gap: .65rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .55rem .9rem; font-size: .88rem; }
  .next-item .ni-icon { font-size: 1.1rem; }
  .next-item .ni-text { color: var(--muted); }
  .next-item .ni-text b { color: var(--text); display: block; font-size: .85rem; }
  .restart-btn { background: transparent; color: var(--blue); border: 1px solid var(--blue); font-family: 'Inter',sans-serif; font-size: .88rem; font-weight: 600; border-radius: 8px; padding: .55rem 1.4rem; cursor: pointer; transition: background .2s; }
  .restart-btn:hover { background: var(--blue-dim); }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.2rem; background: linear-gradient(transparent, var(--bg) 35%); z-index: 50; }
  .nav-btn { display: flex; align-items: center; gap: .35rem; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Inter',sans-serif; font-size: .85rem; font-weight: 600; border-radius: 8px; padding: .45rem 1rem; cursor: pointer; transition: background .15s, border-color .15s, opacity .2s; }
  .nav-btn:hover { background: var(--surface2); border-color: var(--blue); }
  .nav-btn:disabled { opacity: .2; pointer-events: none; }
  .nav-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .nav-btn.primary:hover { background: #79b8ff; }
  .dots { display: flex; gap: .4rem; align-items: center; }
  .dot-item { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background .3s, width .3s; cursor: pointer; }
  .dot-item.active { background: var(--blue); width: 16px; border-radius: 3px; }
  .swipe-hint { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); color: var(--muted); font-size: .72rem; opacity: 1; transition: opacity .5s; pointer-events: none; white-space: nowrap; }
  .swipe-hint.hidden { opacity: 0; }
  .swipe-zone-left { position: fixed; top: 0; left: 0; bottom: 0; width: 18px; z-index: 150; }

  @media (max-width: 380px) {
    .nav-btn span:not(.nav-arrow) { display: none; }
    .nav-btn { padding: .45rem .7rem; }
  }
</style>
</head>

  // ══════════════════════════════════════════════

      {

        title: "C'est quoi un dépôt ?",
        content: `
          <p class="step-desc">Un <b>dépôt</b> (ou <b>repository</b> / <b>repo</b>) est un dossier en ligne qui contient tous les fichiers de ton projet ainsi que l'historique de chaque modification.</p>
          <div class="info-box"><span class="box-icon">💡</span><span>Pense-y comme une clé USB intelligente dans le cloud — accessible partout, avec un historique complet de toutes tes sauvegardes.</span></div>

      {
        type: 'step', num: 2, total: 6,
        title: 'Accéder à la création',
        content: `
          <p class="step-desc">Connecte-toi sur GitHub, puis clique sur le bouton <b>+</b> en haut à droite de la page, et choisis <b>New repository</b>.</p>
          <div class="mockup">
            <div class="mockup-bar"><div class="mockup-dot m-red"></div><div class="mockup-dot m-yellow"></div><div class="mockup-dot m-green"></div></div>
            <div class="mockup-url">🔒 github.com/new</div>
            <div class="mockup-label">Ou accède directement à cette URL</div>
          </div>
          <p class="step-desc">Tu peux aussi aller sur ton profil et cliquer sur l'onglet <b>Repositories</b> puis le bouton vert <b>New</b>.</p>`
      },
      {
        type: 'step', num: 3, total: 6,
        title: 'Nommer ton dépôt',
        content: `
          <p class="step-desc">Donne un <b>nom</b> à ton dépôt dans le champ <b>Repository name</b>. Ce nom apparaîtra dans l'URL :</p>

          <p class="step-desc">La <b>description</b> est optionnelle mais recommandée — elle aide à comprendre le sujet du projet.</p>`
      },
      {
        type: 'step', num: 4, total: 6,
        title: 'Public ou Privé ?',
        content: `
          <p class="step-desc">Choisis la <b>visibilité</b> de ton dépôt :</p>
          <div class="choice-row">
            <div class="choice-card recommended">
              <div class="cc-icon">🌍</div>
              <div class="cc-title">Public</div>
              <div class="cc-desc">Tout le monde peut voir le code. Idéal pour les projets scolaires.</div>

              <div class="cc-icon">🔒</div>

          <div class="info-box" style="margin-top:.2rem"><span class="box-icon">ℹ️</span><span>Tu pourras changer la visibilité à tout moment dans les paramètres du dépôt.</span></div>`

      {

        title: 'Options de démarrage',

          <p class="step-desc">La prochaine étape : apprendre à faire un <b>commit</b> pour sauvegarder tes modifications.</p>`

        <div class="warn-box"><span class="box-icon">📬</span><span>Vérifie le dossier <b>Spam</b> si tu ne le vois pas. Le code expire en 15 minutes.</span></div>` },
      { type: 'step', num: 8, total: 8, title: 'Personnaliser ton profil', content: `
        <p class="step-desc">Réponds aux questions ou clique sur <b>Skip personalization</b>.</p>
        <div class="info-box"><span class="box-icon">🎉</span><span>Compte créé ! Tu peux maintenant créer ton premier dépôt.</span></div>` },
      {
        type: 'final',
        title: 'Compte créé,<br><span>et maintenant ?</span>',
        sub: 'Quelques premières actions pour bien démarrer',
        items: [
          { icon: '🗂️', title: 'Créer un dépôt', desc: 'Clique sur "New" depuis le dashboard' },
          { icon: '⭐', title: 'Explorer des projets', desc: 'Mets des étoiles aux projets intéressants' },
          { icon: '🔑', title: 'Activer la 2FA', desc: 'Settings → Password and authentication' },
          { icon: '📝', title: 'Compléter ton profil', desc: 'Ajoute une photo et une bio' },
        ]
      }
    ]
  }
];

// ═══════════════════════════════════════════════════
//  STATE & INIT
// ═══════════════════════════════════════════════════
let currentGuideIdx = 0, currentSlide = 0;
let startX = 0, isDragging = false, touchMoved = false, hintHidden = false;

function renderSlide(s) {
  if (s.type === 'hero') return `<div class="slide slide-hero">
    <div class="hero-octocat">${s.emoji}</div>
    <h1 class="hero-title">${s.title}</h1>
    <p class="hero-sub">${s.sub}</p>
    <div class="badge-row">${s.badges.map(b=>`<div class="badge"><div class="dot" style="background:${b.color}"></div>${b.label}</div>`).join('')}</div>
    <button class="start-btn" onclick="goTo(1)">Commencer →</button>
  </div>`;
  if (s.type === 'step') return `<div class="slide slide-step">
    <div class="step-inner">
      <span class="step-chip">Étape ${s.num} / ${s.total}</span>
      <h2 class="step-title">${s.title}</h2>
      ${s.content}
    </div>
  </div>`;
  if (s.type === 'final') return `<div class="slide slide-final">
    <div class="final-icon">🎉</div>
    <h2 class="final-title">${s.title}</h2>
    <p class="final-sub">${s.sub}</p>
    <div class="next-steps">${s.items.map(it=>`<div class="next-item"><span class="ni-icon">${it.icon}</span><div class="ni-text"><b>${it.title}</b>${it.desc}</div></div>`).join('')}</div>
    <button class="restart-btn" onclick="goTo(0)">↩ Revoir le guide</button>
  </div>`;
}

function loadGuide(idx) {
  currentGuideIdx = idx; currentSlide = 0;
  const g = GUIDES[idx];
  document.getElementById('slidesTrack').innerHTML = g.slides.map(renderSlide).join('');
  document.getElementById('topbarTitle').textContent = g.title;
  document.getElementById('topbarBadge').textContent = `${idx+1} / ${GUIDES.length}`;
  buildDots(g.slides.length);
  buildSidebar();
  update();
}

function buildDots(total) {
  const dc = document.getElementById('dotsContainer');
  dc.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot-item' + (i===0?' active':'');
    d.onclick = () => goTo(i);
    dc.appendChild(d);
  }
}

function buildSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = '';
  const addLabel = t => { const l=document.createElement('div'); l.className='sidebar-section-label'; l.textContent=t; list.appendChild(l); };
  const addItem = (g,i) => {
    const el = document.createElement('div');
    el.className = 'guide-item'+(i===currentGuideIdx?' active':'');
    el.innerHTML = `<div class="gi-icon">${g.icon}</div><div class="gi-info"><div class="gi-title">${g.title}</div><div class="gi-meta">${g.date} · ${g.slides.length-1} étapes</div></div>${g.isNew?'<span class="gi-new">NEW</span>':''}`;
    el.onclick = () => { loadGuide(i); closeSidebar(); };
    list.appendChild(el);
  };
  addLabel('Guide actuel'); addItem(GUIDES[0], 0);
  if (GUIDES.length > 1) { addLabel('Historique'); GUIDES.slice(1).forEach((g,i) => addItem(g, i+1)); }
}

function update() {
  const total = GUIDES[currentGuideIdx].slides.length;
  const track = document.getElementById('slidesTrack');
  track.style.transform = `translateX(-${currentSlide*100}vw)`;
  document.getElementById('progressBar').style.width = `${(currentSlide/(total-1))*100}%`;
  document.getElementById('btnPrev').disabled = currentSlide===0;
  const bn = document.getElementById('btnNext');
  bn.disabled = currentSlide===total-1;
  bn.innerHTML = currentSlide===total-2 ? '<span>Terminer</span> <span>🎉</span>' : '<span>Suivant</span> <span>→</span>';
  document.querySelectorAll('.dot-item').forEach((d,i)=>d.classList.toggle('active',i===currentSlide));
}

function goTo(n) {
  const total = GUIDES[currentGuideIdx].slides.length;
  currentSlide = Math.max(0, Math.min(total-1, n));
  update();
  if (!hintHidden && currentSlide>0) { hintHidden=true; document.getElementById('swipeHint').classList.add('hidden'); }
}
function next() { goTo(currentSlide+1); }
function prev() { goTo(currentSlide-1); }

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') next();
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') prev();
});

function toggleSidebar() { document.getElementById('sidebar').classList.contains('open') ? closeSidebar() : openSidebar(); }
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }

const swipeZone = document.getElementById('swipeZoneLeft');
let szX=0, szD=false;
swipeZone.addEventListener('touchstart', e=>{szX=e.touches[0].clientX;szD=true;},{passive:true});
swipeZone.addEventListener('touchend', e=>{if(!szD)return; if(e.changedTouches[0].clientX-szX>40)openSidebar(); szD=false;});

const wrapper = document.getElementById('slidesWrapper');
wrapper.addEventListener('touchstart', e=>{if(e.target.closest('button'))return; startX=e.touches[0].clientX;isDragging=true;touchMoved=false;},{passive:true});
wrapper.addEventListener('touchmove', e=>{
  if(!isDragging)return;
  const dx=e.touches[0].clientX-startX;
  if(Math.abs(dx)>10)touchMoved=true;
  const total=GUIDES[currentGuideIdx].slides.length;
  const offset=currentSlide*100+(-dx/window.innerWidth*100);
  const t=document.getElementById('slidesTrack');
  t.style.transition='none';
  t.style.transform=`translateX(-${Math.max(0,Math.min((total-1)*100,offset))}vw)`;
},{passive:true});
wrapper.addEventListener('touchend', e=>{
  if(!isDragging)return;
  const dx=e.changedTouches[0].clientX-startX;
  document.getElementById('slidesTrack').style.transition='transform .45s cubic-bezier(.4,0,.2,1)';
  if(touchMoved&&dx<-50)next(); else if(touchMoved&&dx>50)prev(); else update();
  isDragging=false;touchMoved=false;
});
wrapper.addEventListener('mousedown',e=>{if(e.target.closest('button'))return;startX=e.clientX;isDragging=true;});
wrapper.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const total=GUIDES[currentGuideIdx].slides.length;
  const offset=currentSlide*100+(-(e.clientX-startX)/window.innerWidth*100);
  const t=document.getElementById('slidesTrack');
  t.style.transition='none';
  t.style.transform=`translateX(-${Math.max(0,Math.min((total-1)*100,offset))}vw)`;
});
wrapper.addEventListener('mouseup',e=>{
  if(!isDragging)return;
  const dx=e.clientX-startX;
  document.getElementById('slidesTrack').style.transition='transform .45s cubic-bezier(.4,0,.2,1)';
  if(dx<-50)next();else if(dx>50)prev();else update();
  isDragging=false;
});
wrapper.addEventListener('mouseleave',()=>{ if(isDragging){isDragging=false;document.getElementById('slidesTrack').style.transition='transform .45s cubic-bezier(.4,0,.2,1)';update();} });

loadGuide(0);
setTimeout(()=>document.getElementById('swipeHint').classList.add('hidden'),4000);
</script>
</body>
</html>
